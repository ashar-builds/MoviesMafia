<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- App icon foreground: a bold white "M" (MoviesMafia), matching the site favicon's mark.
     Drawn as a stroked polyline kept well inside the center safe zone so Android's adaptive-icon
     mask can't crop it. MAUI composites this over appicon.svg's red background. -->
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <polyline points="150,306 150,150 228,250 306,150 306,306"
              fill="none" stroke="#ffffff" stroke-width="46"
              stroke-linejoin="round" stroke-linecap="round" />
</svg>
